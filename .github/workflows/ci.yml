name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Solidity libraries
        run: |
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 --branch v5.1.0 \
            https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts

      - name: Show versions
        run: |
          forge --version
          solc --version || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
        env:
          # Reproducible fuzz/invariant runs across CI executions.
          FOUNDRY_FUZZ_SEED: "0x1234"

  schema:
    name: Schema (types + validation)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/schema
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/schema/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  messaging:
    name: Messaging (encrypted PSS lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/messaging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/messaging/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
